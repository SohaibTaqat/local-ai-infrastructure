# LiteLLM Gateway Configuration
# Models are managed dynamically via the DB (STORE_MODEL_IN_DB=True).
# Use the /model/new API endpoint to add models at runtime.

# No model_list here — models are stored in Postgres and managed via API:
#   curl -X POST http://localhost:4000/model/new \
#     -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
#     -H "Content-Type: application/json" \
#     -d '{
#       "model_name": "my-model",
#       "litellm_params": {
#         "model": "openai/my-org/my-model",
#         "api_base": "http://vllm-my-model:8000/v1"
#       }
#     }'

litellm_settings:
  callbacks: ["prometheus", "langfuse"]
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  num_retries: 2
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  proxy_budget_rescheduler_min_time: 60
  proxy_budget_rescheduler_max_time: 64
